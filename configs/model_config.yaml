# configs/model_config.yaml

conflibert_spanish:
  model_id: eventdata-utd/ConfliBERT-Spanish
  max_length: 512
  batch_size: 16

domain_pretraining:
  num_epochs: 3
  learning_rate: 2.0e-5
  warmup_steps: 500
  mlm_probability: 0.15
  seed: 42

finetuning:
  num_epochs: 5
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  seed: 42
  label_smoothing: 0.1
  # Clases de la taxonomía CFH
  labels:
    - O
    - B-EBI
    - I-EBI
    - B-SA
    - I-SA
    - B-NV
    - I-NV
    - B-REP
    - I-REP

asr:
  model: openai/whisper-large-v3
  language: es
  task: transcribe
  batch_size: 8
  # Prompt de condicionamiento con terminología JEP
  initial_prompt: >
    Jurisdicción Especial para la Paz, JEP, Macrocaso 003,
    falsos positivos, ejecuciones extrajudiciales, MAFAPO,
    reconocimiento de responsabilidad, audiencia de reconocimiento.

acoustic:
  feature_set: eGeMAPSv02
  window_size: 0.05
  step_size: 0.01